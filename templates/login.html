<!DOCTYPE html>
<html>
<head>

    <!-- 🔥 FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <!-- 🔥 ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Login - AI Driver Monitoring</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at 20% 20%, #0f172a, #020617 80%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        /* BACKGROUND GLOW */
        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #06b6d4, transparent),
                        radial-gradient(circle at 70% 70%, #22c55e, transparent);
            filter: blur(120px);
            z-index: -1;
        }

        .login-box {
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(0,255,255,0.3);
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        h2 {
            margin-bottom: 15px;
            font-weight: 600;
            background: linear-gradient(90deg, cyan, lime);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 🔴 ERROR MESSAGE */
        .error {
            color: #ff4d4d;
            font-size: 14px;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.08);
            color: white;
            transition: 0.2s;
        }

        input::placeholder {
            color: #94a3b8;
        }

        /* 🔥 INPUT FOCUS EFFECT */
        input:focus {
            box-shadow: 0 0 10px cyan;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, cyan, lime);
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* 🔥 CLICK EFFECT */
        button:active {
            transform: scale(0.95);
        }

        .icon {
            font-size: 30px;
            margin-bottom: 10px;
            color: cyan;
        }

    </style>

</head>

<body>

<div class="bg"></div>

<div class="login-box">

    <div class="icon">
        <i class="fa-solid fa-car-side"></i>
    </div>

    <h2>Driver Login</h2>

    <!-- 🔴 ERROR DISPLAY -->
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input type="text" name="username" placeholder="👤 Username" required>

        <input type="password" name="password" placeholder="🔒 Password" required>

        <button type="submit">
            <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>

    </form>

</div>

</body>
</html>
